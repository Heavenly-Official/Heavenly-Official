<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab — Heavenly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --text: #e8e8e8;
      --subtext: #666666;
      --border: #2a2a2a;
      --card-bg: #111111;
      --card-hover: #181818;
      --input-bg: #141414;
      --accent: #ffffff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, transparent 0%, var(--bg) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      max-width: 640px;
      padding: 0 24px;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 48px;
      font-weight: 200;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    .time {
      font-size: 72px;
      font-weight: 100;
      letter-spacing: -0.02em;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .date {
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--subtext);
      text-transform: uppercase;
    }

    .search-wrapper {
      width: 100%;
      position: relative;
    }

    .search-bar {
      width: 100%;
      padding: 14px 52px 14px 20px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar::placeholder { color: var(--subtext); }

    .search-bar:focus {
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05), 0 0 20px rgba(255,255,255,0.03);
    }

    .search-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--subtext);
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .search-icon svg { width: 18px; height: 18px; }

    .quicklinks {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quicklinks-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--subtext);
      padding-left: 2px;
    }

    .quicklinks-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .quicklink {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .quicklink:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    .quicklink:active { transform: translateY(0); }

    .quicklink-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #888;
    }

    .quicklink-icon svg { width: 16px; height: 16px; }

    .quicklink-name {
      color: var(--subtext);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="header">
      <div class="logo">Heavenly</div>
      <div class="time" id="time">00:00</div>
      <div class="date" id="date">Monday, January 1</div>
    </div>

    <div class="search-wrapper">
      <input
        class="search-bar"
        id="search-bar"
        type="text"
        placeholder="Search or enter address..."
        autocomplete="off"
        spellcheck="false"
      />
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
    </div>

    <div class="quicklinks">
      <div class="quicklinks-label">Quick Access</div>
      <div class="quicklinks-grid">
        <a class="quicklink" data-url="https://www.google.com">
          <div class="quicklink-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </div>
          <span class="quicklink-name">Google</span>
        </a>
        <a class="quicklink" data-url="https://github.com">
          <div class="quicklink-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/>
            </svg>
          </div>
          <span class="quicklink-name">GitHub</span>
        </a>
        <a class="quicklink" data-url="https://www.youtube.com">
          <div class="quicklink-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/><path d="m10 15 5-3-5-3z"/>
            </svg>
          </div>
          <span class="quicklink-name">YouTube</span>
        </a>
        <a class="quicklink" data-url="https://www.reddit.com">
          <div class="quicklink-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M14.5 9a2 2 0 0 0-3 0"/><path d="M8 13a4 4 0 0 0 8 0"/><path d="M8 11h.01"/><path d="M16 11h.01"/>
            </svg>
          </div>
          <span class="quicklink-name">Reddit</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time').textContent = h + ':' + m;

      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June',
        'July','August','September','October','November','December'];
      document.getElementById('date').textContent =
        days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
    }

    updateClock();
    setInterval(updateClock, 1000);

    function navigateParent(url) {
      try {
        window.parent.postMessage({ type: 'navigate', url: url }, '*');
      } catch(e) {}
    }

    const searchBar = document.getElementById('search-bar');
    searchBar.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const val = searchBar.value.trim();
        if (val) navigateParent(val);
      }
    });

    document.querySelectorAll('.quicklink').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.preventDefault();
        navigateParent(el.dataset.url);
      });
    });
  </script>
</body>
</html>
