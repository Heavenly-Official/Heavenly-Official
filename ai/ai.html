<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI — Heavenly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --text: #e8e8e8;
      --subtext: #666666;
      --border: #2a2a2a;
      --card-bg: #111111;
      --card-hover: #181818;
      --input-bg: #141414;
      --accent: #ffffff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      flex: 0 0 auto;
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--subtext);
    }

    .header-icon svg { width: 18px; height: 18px; }

    .header-text h1 {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--subtext);
      margin-top: 2px;
    }

    .content {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 28px 32px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 12px;
    }

    .models-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .model-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .model-card:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.1);
    }

    .model-card.selected {
      border-color: rgba(255,255,255,0.35);
      background: #181818;
    }

    .model-radio {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex: 0 0 16px;
      margin-top: 1px;
      transition: border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .model-card.selected .model-radio {
      border-color: var(--accent);
    }

    .model-radio-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: none;
    }

    .model-card.selected .model-radio-dot { display: block; }

    .model-info { flex: 1 1 auto; }

    .model-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .model-desc {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 3px;
      line-height: 1.5;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .setting-row + .setting-row { margin-top: 8px; }

    .setting-label { font-size: 13px; color: var(--text); }
    .setting-sub { font-size: 11px; color: var(--subtext); margin-top: 2px; }

    .toggle {
      width: 38px;
      height: 22px;
      background: #2a2a2a;
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex: 0 0 38px;
      border: none;
    }

    .toggle.on { background: #4a4a4a; }

    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #666;
      top: 3px;
      left: 3px;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle.on::after {
      transform: translateX(16px);
      background: var(--accent);
    }

    .select-input {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .select-input:focus { border-color: rgba(255,255,255,0.2); }
    .select-input option { background: #1a1a1a; }

    .ai-links {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .ai-link {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }

    .ai-link:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.1);
    }

    .ai-link-icon { font-size: 18px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
        <circle cx="9" cy="14" r="1"/>
        <circle cx="15" cy="14" r="1"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>AI Settings</h1>
      <p>Heavenly://ai</p>
    </div>
  </div>

  <div class="content">
    <div>
      <div class="section-label">Default Model</div>
      <div class="models-grid" id="models-grid"></div>
    </div>

    <div>
      <div class="section-label">Preferences</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Stream responses</div>
          <div class="setting-sub">Show AI replies word-by-word as they arrive</div>
        </div>
        <button class="toggle on" id="toggle-stream" aria-label="Stream responses" aria-pressed="true"></button>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Safe search</div>
          <div class="setting-sub">Filter explicit content from AI results</div>
        </div>
        <button class="toggle on" id="toggle-safe" aria-label="Safe search" aria-pressed="true"></button>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Response language</div>
          <div class="setting-sub">Language used for AI replies</div>
        </div>
        <select class="select-input" id="lang-select">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="pt">Portuguese</option>
          <option value="ko">Korean</option>
        </select>
      </div>
    </div>

    <div>
      <div class="section-label">Open AI Assistant</div>
      <div class="ai-links" id="ai-links"></div>
    </div>
  </div>

  <script>
    const MODELS = [
      { id: 'gpt4o',   name: 'GPT-4o',         desc: 'OpenAI — fast & powerful' },
      { id: 'gemini',  name: 'Gemini Pro',      desc: 'Google — multimodal AI' },
      { id: 'claude',  name: 'Claude 3.5',      desc: 'Anthropic — thoughtful AI' },
      { id: 'llama',   name: 'Llama 3',         desc: 'Meta — open source' },
      { id: 'mistral', name: 'Mistral Large',   desc: 'Mistral AI — efficient' },
      { id: 'perplexity', name: 'Perplexity',   desc: 'Web-connected search AI' },
    ];

    const AI_LINKS = [
      { name: 'ChatGPT',    icon: '🤖', url: 'https://chat.openai.com/' },
      { name: 'Gemini',     icon: '✨', url: 'https://gemini.google.com/' },
      { name: 'Claude',     icon: '🧠', url: 'https://claude.ai/' },
      { name: 'Perplexity', icon: '🔍', url: 'https://www.perplexity.ai/' },
      { name: 'Copilot',    icon: '💡', url: 'https://copilot.microsoft.com/' },
      { name: 'Mistral',    icon: '🌊', url: 'https://chat.mistral.ai/' },
    ];

    function load(key, def) {
      try { return localStorage.getItem('heavenly_ai_' + key) ?? def; } catch(e) { return def; }
    }

    function save(key, val) {
      try { localStorage.setItem('heavenly_ai_' + key, val); } catch(e) {}
    }

    function navigate(url) {
      try { window.parent.postMessage({ type: 'navigate', url }, '*'); } catch(e) {}
    }

    // Models
    const selectedModel = load('model', 'gpt4o');
    const grid = document.getElementById('models-grid');
    MODELS.forEach(m => {
      const card = document.createElement('div');
      card.className = 'model-card' + (m.id === selectedModel ? ' selected' : '');
      card.dataset.id = m.id;
      card.innerHTML = `
        <div class="model-radio"><div class="model-radio-dot"></div></div>
        <div class="model-info">
          <div class="model-name">${m.name}</div>
          <div class="model-desc">${m.desc}</div>
        </div>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        save('model', m.id);
      });
      grid.appendChild(card);
    });

    // Toggles
    function setupToggle(id, key) {
      const btn = document.getElementById(id);
      let state = load(key, 'on') === 'on';
      if (!state) btn.classList.remove('on');
      btn.setAttribute('aria-pressed', String(state));
      btn.addEventListener('click', () => {
        state = !state;
        btn.classList.toggle('on', state);
        btn.setAttribute('aria-pressed', String(state));
        save(key, state ? 'on' : 'off');
      });
    }
    setupToggle('toggle-stream', 'stream');
    setupToggle('toggle-safe', 'safe');

    // Language
    const langSel = document.getElementById('lang-select');
    langSel.value = load('lang', 'en');
    langSel.addEventListener('change', () => save('lang', langSel.value));

    // AI Links
    const linksContainer = document.getElementById('ai-links');
    AI_LINKS.forEach(l => {
      const a = document.createElement('div');
      a.className = 'ai-link';
      a.innerHTML = `<span class="ai-link-icon">${l.icon}</span>${l.name}`;
      a.addEventListener('click', () => navigate(l.url));
      linksContainer.appendChild(a);
    });
  </script>
</body>
</html>
