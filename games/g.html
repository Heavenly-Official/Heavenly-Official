<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games — Heavenly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --text: #e8e8e8;
      --subtext: #666666;
      --border: #2a2a2a;
      --card-bg: #111111;
      --card-hover: #181818;
      --input-bg: #141414;
      --accent: #ffffff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      flex: 0 0 auto;
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--subtext);
    }

    .header-icon svg { width: 18px; height: 18px; }

    .header-text h1 {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--subtext);
      margin-top: 2px;
    }

    .search-row {
      flex: 0 0 auto;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      max-width: 360px;
      padding: 9px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--subtext); }
    .search-input:focus { border-color: rgba(255,255,255,0.2); }

    .games-area {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 24px 32px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 14px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 14px 14px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      text-align: center;
    }

    .game-card:hover {
      background: var(--card-hover);
      border-color: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .game-card:active { transform: translateY(0); }

    .game-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .game-name {
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
    }

    .game-tag {
      font-size: 10px;
      color: var(--subtext);
    }

    .empty {
      color: var(--subtext);
      font-size: 13px;
      padding: 40px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <path d="M12 12h.01"/>
        <path d="M7 12h2"/>
        <path d="M8 11v2"/>
        <path d="M16 11h2"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Games</h1>
      <p>Heavenly://games</p>
    </div>
  </div>

  <div class="search-row">
    <input class="search-input" id="search" type="text"
      placeholder="Search games…" autocomplete="off" spellcheck="false" />
  </div>

  <div class="games-area">
    <div class="section-label">Popular</div>
    <div class="games-grid" id="games-grid"></div>
  </div>

  <script>
    const GAMES = [
      { name: '2048',          icon: '🔢', tag: 'Puzzle',     url: 'https://play2048.co/' },
      { name: 'Chess',         icon: '♟️', tag: 'Strategy',   url: 'https://www.chess.com/play/online' },
      { name: 'Wordle',        icon: '🟩', tag: 'Word',       url: 'https://www.nytimes.com/games/wordle/index.html' },
      { name: 'Snake',         icon: '🐍', tag: 'Arcade',     url: 'https://playsnake.org/' },
      { name: 'Tetris',        icon: '🟦', tag: 'Arcade',     url: 'https://tetris.com/play-tetris' },
      { name: 'Minesweeper',   icon: '💣', tag: 'Puzzle',     url: 'https://minesweeper.online/' },
      { name: 'Sudoku',        icon: '🔣', tag: 'Puzzle',     url: 'https://sudoku.com/' },
      { name: 'Pac-Man',       icon: '👾', tag: 'Arcade',     url: 'https://www.google.com/logos/2010/pacman10-i.html' },
      { name: 'Flappy Bird',   icon: '🐦', tag: 'Arcade',     url: 'https://flappybird.io/' },
      { name: 'Geometry Dash', icon: '🔺', tag: 'Platformer', url: 'https://www.geometrydash.io/game' },
      { name: 'Slope',         icon: '🏂', tag: 'Action',     url: 'https://slope-game.github.io/' },
      { name: 'Drift Boss',    icon: '🚗', tag: 'Racing',     url: 'https://driftboss.io/' },
    ];

    function navigate(url) {
      try { window.parent.postMessage({ type: 'navigate', url }, '*'); } catch(e) {}
    }

    function render(list) {
      const grid = document.getElementById('games-grid');
      if (!list.length) {
        grid.innerHTML = '<div class="empty">No games found.</div>';
        return;
      }
      grid.innerHTML = '';
      list.forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <div class="game-icon">${g.icon}</div>
          <div class="game-name">${g.name}</div>
          <div class="game-tag">${g.tag}</div>
        `;
        card.addEventListener('click', () => navigate(g.url));
        grid.appendChild(card);
      });
    }

    render(GAMES);

    document.getElementById('search').addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      render(q ? GAMES.filter(g =>
        g.name.toLowerCase().includes(q) || g.tag.toLowerCase().includes(q)
      ) : GAMES);
    });
  </script>
</body>
</html>
