<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b0b;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <iframe id="embed-frame" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen"></iframe>

  <script>
    (function () {
      const frame = document.getElementById('embed-frame');
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('url') || '';

      if (!raw) {
        document.title = 'No URL';
        frame.src = 'about:blank';
        return;
      }

      let target = raw;
      try {
        target = decodeURIComponent(raw);
      } catch (e) {}

      const isHttp = /^https?:\/\//i.test(target);
      if (!isHttp) {
        target = 'https://www.google.com/search?q=' + encodeURIComponent(target);
      }

      frame.src = target;

      try {
        const host = new URL(target).hostname.replace(/^www\./i, '');
        document.title = host || 'Embedded Page';
      } catch (e) {
        document.title = 'Embedded Page';
      }
    })();
  </script>
</body>
</html>
