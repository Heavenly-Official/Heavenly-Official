<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heavenly AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --card-soft: #141414;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --subtext: #6c6c6c;
      --accent: #00d4aa;
      --accent-soft: rgba(0, 212, 170, 0.14);
      --danger: #ff6666;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      flex: 0 0 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #111111 0%, #0d0d0d 100%);
    }

    .brand-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px rgba(0, 212, 170, 0.5);
      flex-shrink: 0;
    }

    .panel-title-wrap {
      min-width: 0;
      flex: 1;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1.15;
    }

    .panel-subtitle {
      font-size: 10px;
      color: var(--subtext);
      line-height: 1.15;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .expand-btn {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      color: var(--subtext);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .expand-btn:hover {
      background: #1a1a1a;
      color: var(--text);
      border-color: #3a3a3a;
    }

    .expand-btn svg { width: 13px; height: 13px; }

    .scroll-area {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 12px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .chat-sidebar {
      background: #101010;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 200px;
    }

    .chat-sidebar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .chat-sidebar-title {
      font-size: 10px;
      font-weight: 600;
      color: #6d6d6d;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .chat-new {
      border: 1px solid rgba(0, 212, 170, 0.45);
      background: rgba(0, 212, 170, 0.1);
      color: #b8f4e5;
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .chat-new:hover {
      background: rgba(0, 212, 170, 0.18);
      border-color: rgba(0, 212, 170, 0.65);
    }

    .chat-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: auto;
      max-height: 220px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
      padding-right: 2px;
    }

    .chat-item {
      width: 100%;
      border: 1px solid #262626;
      border-radius: 9px;
      padding: 8px;
      background: #151515;
      color: #d8d8d8;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .chat-item:hover {
      border-color: #3a3a3a;
      background: #1a1a1a;
    }

    .chat-item.active {
      border-color: rgba(0, 212, 170, 0.55);
      background: #13221d;
      color: #d8f7ef;
    }

    .chat-item-title {
      flex: 1;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
    }

    .chat-delete {
      border: none;
      background: transparent;
      color: #7a7a7a;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      transition: background 0.15s, color 0.15s;
    }

    .chat-delete:hover {
      background: rgba(255, 102, 102, 0.16);
      color: #ffbebe;
    }

    .chat-empty {
      border: 1px dashed #2d2d2d;
      border-radius: 9px;
      padding: 12px;
      text-align: center;
      font-size: 11px;
      color: #6d6d6d;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #4d4d4d;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .chat-wrap {
      display: flex;
      flex-direction: column;
      min-height: 340px;
    }

    .chat-log {
      flex: 1;
      min-height: 220px;
      max-height: 310px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
      margin-bottom: 10px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .msg {
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.45;
      border: 1px solid #232323;
      background: #121212;
      color: #cfcfcf;
      word-break: break-word;
    }

    .msg.user {
      background: #151515;
      color: #f2f2f2;
      border-color: #2d2d2d;
    }

    .msg.assistant {
      background: #101614;
      border-color: #1d3a32;
      color: #d5f5ec;
    }

    .typing {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--subtext);
      margin-bottom: 8px;
      min-height: 16px;
    }

    .typing.active { display: flex; }

    .typing i {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.28;
      animation: blink 1s infinite;
    }

    .typing i:nth-child(2) { animation-delay: 0.16s; }
    .typing i:nth-child(3) { animation-delay: 0.32s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.24; }
      40% { opacity: 1; }
    }

    .composer {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0f0f0f;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .composer textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      min-height: 64px;
      max-height: 140px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      line-height: 1.4;
    }

    .composer textarea::placeholder {
      color: #5f5f5f;
    }

    .composer-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .hint {
      font-size: 10px;
      color: #5c5c5c;
    }

    .btn-row {
      display: flex;
      gap: 6px;
    }

    .btn {
      border: 1px solid #2c2c2c;
      border-radius: 7px;
      background: #171717;
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 7px 10px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .btn:hover {
      border-color: #3f3f3f;
      background: #1d1d1d;
    }

    .btn.primary {
      border-color: rgba(0, 212, 170, 0.45);
      background: rgba(0, 212, 170, 0.15);
      color: #b9f4e5;
    }

    .btn.primary:hover {
      background: rgba(0, 212, 170, 0.22);
      border-color: rgba(0, 212, 170, 0.65);
    }

    .btn.clear {
      color: #ffb0b0;
      border-color: rgba(255, 102, 102, 0.4);
      background: rgba(255, 102, 102, 0.1);
    }

    .btn.clear:hover {
      background: rgba(255, 102, 102, 0.16);
      border-color: rgba(255, 102, 102, 0.6);
      color: #ffd0d0;
    }

    @media (min-width: 440px) {
      .layout {
        grid-template-columns: 180px minmax(0, 1fr);
      }

      .chat-list {
        max-height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="panel-header">
    <span class="brand-dot"></span>
    <div class="panel-title-wrap">
      <div class="panel-title">Heavenly AI</div>
      <div class="panel-subtitle">Built in house for this browser</div>
    </div>
    <button class="expand-btn" id="expand-btn" title="Expand sidebar" aria-label="Expand sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"></polyline>
        <polyline points="9 21 3 21 3 15"></polyline>
        <line x1="21" y1="3" x2="14" y2="10"></line>
        <line x1="3" y1="21" x2="10" y2="14"></line>
      </svg>
    </button>
  </div>

  <div class="scroll-area">
    <section class="layout">
      <aside class="chat-sidebar">
        <div class="chat-sidebar-head">
          <p class="chat-sidebar-title">Chats</p>
          <button class="chat-new" id="new-chat-btn" type="button">New</button>
        </div>
        <ul class="chat-list" id="chat-list"></ul>
        <div class="chat-empty" id="chat-empty">No chats yet. Create one.</div>
      </aside>

      <div class="card chat-wrap">
        <p class="section-label" id="chat-heading">Chat</p>
        <div class="chat-log" id="chat-log"></div>

        <div class="typing" id="typing-indicator" aria-live="polite">
          <i></i><i></i><i></i>
          <span>Heavenly AI is thinking...</span>
        </div>

        <div class="composer">
          <textarea id="chat-input" placeholder="Type a request for your in-house AI..."></textarea>
          <div class="composer-controls">
            <span class="hint">Press Ctrl+Enter to send</span>
            <div class="btn-row">
              <button class="btn clear" id="clear-btn" type="button">Clear</button>
              <button class="btn primary" id="send-btn" type="button">Send</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const chatLog = document.getElementById('chat-log');
    const chatList = document.getElementById('chat-list');
    const chatEmpty = document.getElementById('chat-empty');
    const chatHeading = document.getElementById('chat-heading');
    const newChatBtn = document.getElementById('new-chat-btn');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    let chatCounter = 2;
    let activeChatId = 'chat-1';
    const chats = [
      {
        id: 'chat-1',
        title: 'Welcome chat',
        messages: [
          {
            role: 'assistant',
            content: 'Heavenly AI online. Ask for planning, coding help, or quick product decisions.'
          }
        ]
      }
    ];

    const cannedResponses = [
      {
        match: /plan|checklist|roadmap/i,
        reply: 'Heavenly AI plan: 1) define scope, 2) ship smallest usable version, 3) collect feedback, 4) iterate weekly with measurable goals.'
      },
      {
        match: /code|refactor|architecture|component/i,
        reply: 'For code quality, split concerns into state, rendering, and events. Keep DOM mutations isolated, and write small helper functions for repeated UI behavior.'
      },
      {
        match: /test|qa|bug/i,
        reply: 'Suggested tests: tab create/close switch flow, sidebar expand collapse state, address navigation normalization, and keyboard shortcuts for send and tab control.'
      },
      {
        match: /design|ui|ux/i,
        reply: 'For UI polish: keep spacing rhythm at 4px multiples, reinforce hierarchy with weight and contrast, and use one accent color only for actions and status.'
      }
    ];

    function createChat() {
      const id = 'chat-' + chatCounter;
      chatCounter += 1;

      const chat = {
        id,
        title: 'New chat ' + (chatCounter - 1),
        messages: [
          {
            role: 'assistant',
            content: 'New chat created. What do you want to build next?'
          }
        ]
      };

      chats.unshift(chat);
      setActiveChat(chat.id);
      renderChatList();
      renderMessages();
    }

    function setActiveChat(chatId) {
      activeChatId = chatId;
      renderChatList();
      renderMessages();
    }

    function deleteChat(chatId) {
      const index = chats.findIndex(chat => chat.id === chatId);
      if (index === -1) return;

      chats.splice(index, 1);

      if (!chats.length) {
        createChat();
        return;
      }

      if (activeChatId === chatId) {
        activeChatId = chats[0].id;
      }

      renderChatList();
      renderMessages();
    }

    function getActiveChat() {
      return chats.find(chat => chat.id === activeChatId) || chats[0];
    }

    function renderChatList() {
      chatList.innerHTML = '';

      chats.forEach(chat => {
        const li = document.createElement('li');
        const item = document.createElement('div');
        item.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
        item.setAttribute('role', 'button');
        item.setAttribute('tabindex', '0');

        const title = document.createElement('span');
        title.className = 'chat-item-title';
        title.textContent = chat.title;

        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'chat-delete';
        del.setAttribute('aria-label', 'Delete chat');
        del.textContent = 'x';
        del.addEventListener('click', event => {
          event.stopPropagation();
          deleteChat(chat.id);
        });

        item.appendChild(title);
        item.appendChild(del);
        item.addEventListener('click', () => setActiveChat(chat.id));
        item.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            setActiveChat(chat.id);
          }
        });
        li.appendChild(item);
        chatList.appendChild(li);
      });

      chatEmpty.style.display = chats.length ? 'none' : 'block';
    }

    function addMessage(content, role) {
      const active = getActiveChat();
      active.messages.push({ role, content });
      if (role === 'user' && active.title.startsWith('New chat')) {
        active.title = content.slice(0, 24) || 'Untitled chat';
      }
      renderChatList();
      renderMessages();
    }

    function renderMessages() {
      const active = getActiveChat();
      chatLog.innerHTML = '';

      active.messages.forEach(message => {
        const node = document.createElement('article');
        node.className = 'msg ' + message.role;
        node.textContent = message.content;
        chatLog.appendChild(node);
      });

      chatHeading.textContent = active.title;
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function resolveResponse(input) {
      const match = cannedResponses.find(item => item.match.test(input));
      if (match) return match.reply;

      return 'Heavenly AI received your request. Next step: connect this panel to your backend inference endpoint, then stream live tokens into this chat window.';
    }

    function sendMessage() {
      const value = chatInput.value.trim();
      if (!value) return;

      addMessage(value, 'user');
      chatInput.value = '';

      typingIndicator.classList.add('active');
      setTimeout(() => {
        typingIndicator.classList.remove('active');
        addMessage(resolveResponse(value), 'assistant');
      }, 500);
    }

    sendBtn.addEventListener('click', sendMessage);

    chatInput.addEventListener('keydown', event => {
      if (event.key === 'Enter' && event.ctrlKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener('click', () => {
      const active = getActiveChat();
      active.messages = [
        {
          role: 'assistant',
          content: 'Conversation cleared. Heavenly AI is ready for a new task.'
        }
      ];
      renderMessages();
    });

    newChatBtn.addEventListener('click', createChat);

    document.getElementById('expand-btn').addEventListener('click', () => {
      window.parent.postMessage({ type: 'sidebar-toggle-expand' }, '*');
    });

    renderChatList();
    renderMessages();
  </script>
</body>
</html>
