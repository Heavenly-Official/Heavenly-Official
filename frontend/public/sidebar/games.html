<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --card-hover: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --subtext: #666;
      --accent: #7c6aff;
      --header-h: 44px;
      --search-h: 52px;
      --cats-h: 44px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      flex: 0 0 var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtext);
      flex: 1;
    }

    .expand-btn {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      color: var(--subtext);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .expand-btn:hover {
      background: #1a1a1a;
      color: var(--text);
      border-color: #3a3a3a;
    }

    .expand-btn svg { width: 13px; height: 13px; }

    .search-bar-wrap {
      flex: 0 0 var(--search-h);
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      background: #161616;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder { color: var(--subtext); }
    .search-input:focus { border-color: rgba(255,255,255,0.18); }

    .cats-wrap {
      flex: 0 0 var(--cats-h);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }

    .cats-wrap::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--subtext);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .cat-btn:hover { background: #161616; color: var(--text); }

    .cat-btn.active {
      background: rgba(124,106,255,0.15);
      border-color: rgba(124,106,255,0.4);
      color: #a899ff;
    }

    .games-scroll {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 10px 12px 16px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .games-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
    }

    .game-card:hover {
      background: var(--card-hover);
      border-color: rgba(124,106,255,0.3);
      transform: translateY(-1px);
    }

    .game-card:active { transform: translateY(0); }

    .game-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .game-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game-thumb-placeholder {
      font-size: 28px;
      user-select: none;
    }

    .game-info {
      padding: 7px 8px 8px;
    }

    .game-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .game-cat {
      font-size: 10px;
      color: var(--subtext);
      margin-top: 2px;
    }

    .load-more-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--subtext);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }

    .load-more-btn:hover { background: #161616; color: var(--text); }

    .status-msg {
      text-align: center;
      color: var(--subtext);
      font-size: 12px;
      padding: 32px 0;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>
<body>

  <div class="panel-header">
    <span class="panel-title">Games</span>
    <button class="expand-btn" id="expand-btn" title="Expand sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
  </div>

  <div class="search-bar-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Search games..." autocomplete="off" spellcheck="false" />
  </div>

  <div class="cats-wrap" id="cats-wrap"></div>

  <div class="games-scroll" id="games-scroll">
    <div class="games-grid" id="games-grid"></div>
    <div class="status-msg loading-dots" id="status-msg">Loading</div>
    <button class="load-more-btn" id="load-more-btn" style="display:none">Load more</button>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    let page = 1;
    let totalPages = 1;
    let query = '';
    let activeCategory = '';
    let allGames = [];
    let ready = false;

    const grid = document.getElementById('games-grid');
    const statusMsg = document.getElementById('status-msg');
    const loadMoreBtn = document.getElementById('load-more-btn');
    const searchInput = document.getElementById('search-input');
    const catsWrap = document.getElementById('cats-wrap');

    async function init() {
      await Lumin.init({ headless: true });
      ready = true;

      const { categories } = await Lumin.getCategories();
      renderCategories(['All', ...categories]);

      await loadGames(true);
    }

    function renderCategories(cats) {
      catsWrap.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          activeCategory = cat === 'All' ? '' : cat;
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          page = 1;
          loadGames(true);
        });
        catsWrap.appendChild(btn);
      });
    }

    async function loadGames(reset) {
      if (!ready) return;
      if (reset) {
        page = 1;
        grid.innerHTML = '';
        allGames = [];
      }

      statusMsg.style.display = '';
      statusMsg.textContent = 'Loading';
      statusMsg.className = 'status-msg loading-dots';
      loadMoreBtn.style.display = 'none';

      const q = activeCategory ? activeCategory + (query ? ' ' + query : '') : query;
      const result = await Lumin.getGames({ page, limit: 20, q });
      totalPages = result.pages;
      allGames = [...allGames, ...result.games];

      statusMsg.style.display = 'none';

      if (allGames.length === 0) {
        statusMsg.textContent = 'No games found';
        statusMsg.className = 'status-msg';
        statusMsg.style.display = '';
        return;
      }

      if (reset) {
        grid.innerHTML = '';
      }

      renderGames(result.games);

      if (page < totalPages) {
        loadMoreBtn.style.display = '';
      }
    }

    function renderGames(games) {
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <div class="game-thumb">
            <span class="game-thumb-placeholder">🎮</span>
          </div>
          <div class="game-info">
            <div class="game-name">${escHtml(game.name)}</div>
            <div class="game-cat">${escHtml(game.category || '')}</div>
          </div>
        `;

        const thumb = card.querySelector('.game-thumb');
        if (game.image_token) {
          Lumin.getImageUrl(game.image_token).then(src => {
            const img = document.createElement('img');
            img.src = src;
            img.alt = game.name;
            img.onerror = () => {};
            thumb.innerHTML = '';
            thumb.appendChild(img);
          }).catch(() => {});
        }

        card.addEventListener('click', () => launchGame(game));
        grid.appendChild(card);
      });
    }

    async function launchGame(game) {
      try {
        const { url } = await Lumin.getGameUrl(game.id);
        window.parent.postMessage({ type: 'navigate', url }, '*');
      } catch(e) {}
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let searchTimer = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        query = searchInput.value.trim();
        page = 1;
        loadGames(true);
      }, 320);
    });

    loadMoreBtn.addEventListener('click', () => {
      page++;
      loadGames(false);
    });

    document.getElementById('expand-btn').addEventListener('click', () => {
      window.parent.postMessage({ type: 'sidebar-toggle-expand' }, '*');
    });

    init();
  </script>
</body>
</html>
