<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --card-hover: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --subtext: #666;
      --accent: #7c6aff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow-y: auto;
      padding: 16px 12px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #444;
      margin: 18px 0 8px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .game-card:hover {
      background: var(--card-hover);
      border-color: rgba(124,106,255,0.3);
      transform: translateY(-1px);
    }

    .game-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .game-name {
      font-size: 11px;
      font-weight: 400;
      color: var(--subtext);
      text-align: center;
      line-height: 1.3;
    }

    .featured {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 4px;
    }

    .featured:hover {
      background: var(--card-hover);
      border-color: rgba(124,106,255,0.3);
    }

    .featured-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c6aff22, #7c6aff44);
      border: 1px solid rgba(124,106,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .featured-info { flex: 1; min-width: 0; }
    .featured-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
    .featured-desc { font-size: 11px; color: var(--subtext); line-height: 1.4; }

    .badge {
      display: inline-block;
      background: rgba(124,106,255,0.15);
      color: #9d8fff;
      border: 1px solid rgba(124,106,255,0.25);
      border-radius: 4px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 6px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <h1>Games</h1>

  <div class="section-label">Featured</div>
  <a class="featured" data-url="https://www.crazygames.com" onclick="nav(event)">
    <div class="featured-icon">🎮</div>
    <div class="featured-info">
      <div class="badge">Popular</div>
      <div class="featured-name">CrazyGames</div>
      <div class="featured-desc">Hundreds of free browser games</div>
    </div>
  </a>
  <a class="featured" data-url="https://www.miniclip.com" onclick="nav(event)">
    <div class="featured-icon">⚡</div>
    <div class="featured-info">
      <div class="badge">Classic</div>
      <div class="featured-name">Miniclip</div>
      <div class="featured-desc">Classic casual games online</div>
    </div>
  </a>

  <div class="section-label">Quick Play</div>
  <div class="game-grid">
    <a class="game-card" data-url="https://www.chess.com/play/computer" onclick="nav(event)">
      <div class="game-icon">♟</div>
      <span class="game-name">Chess</span>
    </a>
    <a class="game-card" data-url="https://sudoku.com" onclick="nav(event)">
      <div class="game-icon">🔢</div>
      <span class="game-name">Sudoku</span>
    </a>
    <a class="game-card" data-url="https://wordle.bots.works" onclick="nav(event)">
      <div class="game-icon">🟩</div>
      <span class="game-name">Wordle</span>
    </a>
    <a class="game-card" data-url="https://2048.io" onclick="nav(event)">
      <div class="game-icon">🔲</div>
      <span class="game-name">2048</span>
    </a>
    <a class="game-card" data-url="https://www.poki.com" onclick="nav(event)">
      <div class="game-icon">🕹</div>
      <span class="game-name">Poki</span>
    </a>
    <a class="game-card" data-url="https://www.addictinggames.com" onclick="nav(event)">
      <div class="game-icon">🎯</div>
      <span class="game-name">Addicting</span>
    </a>
  </div>

  <script>
    function nav(e) {
      e.preventDefault();
      const url = e.currentTarget.dataset.url;
      window.parent.postMessage({ type: 'sidebar-navigate', url }, '*');
    }
  </script>
</body>
</html>
