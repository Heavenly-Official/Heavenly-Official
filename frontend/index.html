<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heavenly</title>
  <link rel="stylesheet" href="public/assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div class="browser">
    <div class="browser-chrome">
      <div class="tab-bar">
        <div class="tabs-container" id="tabs-container"></div>
        <button class="new-tab-btn" id="new-tab-btn" title="New Tab">
          <i data-lucide="plus"></i>
        </button>
        <div class="tab-bar-spacer"></div>
      </div>
      <div class="toolbar">
        <button class="nav-btn" id="back-btn" title="Back">
          <i data-lucide="chevron-left"></i>
        </button>
        <button class="nav-btn" id="forward-btn" title="Forward">
          <i data-lucide="chevron-right"></i>
        </button>
        <button class="nav-btn" id="reload-btn" title="Reload">
          <i data-lucide="rotate-cw"></i>
        </button>
        <div class="address-bar-container" id="address-bar-container">
          <span class="favicon-display" id="favicon-display">
            <i data-lucide="globe"></i>
          </span>
          <input
            class="address-bar"
            id="address-bar"
            type="text"
            placeholder="Search or enter address"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="go-btn" id="go-btn" title="Go">
            <i data-lucide="arrow-right"></i>
          </button>
        </div>
        <button class="nav-btn" id="home-btn" title="Home">
          <i data-lucide="home"></i>
        </button>
      </div>
    </div>

    <div class="browser-body">
      <div class="browser-content" id="browser-content"></div>
    </div>
  </div>

  <!-- Control panel overlay (Ctrl+Y) -->
  <div id="ctrl-panel-overlay">
    <div id="ctrl-panel">
      <div class="ctrl-panel-header">
        <i data-lucide="layout-grid"></i>
        <span class="ctrl-panel-title">Control Panel</span>
        <span class="ctrl-panel-shortcut">Ctrl+Y</span>
      </div>
      <div class="ctrl-panel-list" id="ctrl-panel-list"></div>
    </div>
  </div>

  <!-- Hint note -->
  <div id="ctrl-panel-hint">Ctrl+Y — Control Panel</div>

  <script src="public/assets/js/main.js"></script>
</body>
</html>
