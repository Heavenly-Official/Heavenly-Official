<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heavenly</title>
  <link rel="stylesheet" href="public/assets/css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div class="browser">
    <div class="browser-chrome">
      <div class="tab-bar">
        <div class="tabs-container" id="tabs-container"></div>
        <button class="new-tab-btn" id="new-tab-btn" title="New Tab">
          <i data-lucide="plus"></i>
        </button>
        <div class="tab-bar-spacer"></div>
      </div>
      <div class="toolbar">
        <button class="nav-btn" id="back-btn" title="Back">
          <i data-lucide="chevron-left"></i>
        </button>
        <button class="nav-btn" id="forward-btn" title="Forward">
          <i data-lucide="chevron-right"></i>
        </button>
        <button class="nav-btn" id="reload-btn" title="Reload">
          <i data-lucide="rotate-cw"></i>
        </button>
        <div class="address-bar-container" id="address-bar-container">
          <span class="favicon-display" id="favicon-display">
            <i data-lucide="globe"></i>
          </span>
          <input
            class="address-bar"
            id="address-bar"
            type="text"
            placeholder="Search or enter address"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="go-btn" id="go-btn" title="Go">
            <i data-lucide="arrow-right"></i>
          </button>
        </div>
        <div class="toolbar-sidebar" id="sidebar">
          <button class="sidebar-rail-btn" id="srb-games" data-panel="games" title="Games">
            <i data-lucide="gamepad-2"></i>
          </button>
          <button class="sidebar-rail-btn" id="srb-ai" data-panel="ai" title="AI Tools">
            <i data-lucide="sparkles"></i>
          </button>
          <button class="sidebar-rail-btn" id="srb-movies" data-panel="movies" title="Movies &amp; TV">
            <i data-lucide="clapperboard"></i>
          </button>
          <button class="sidebar-rail-btn" id="srb-settings" data-panel="settings" title="Settings">
            <i data-lucide="settings"></i>
          </button>
        </div>
        <button class="nav-btn" id="home-btn" title="Home">
          <i data-lucide="home"></i>
        </button>
      </div>
    </div>

    <div class="browser-body">
      <div class="browser-content" id="browser-content"></div>
      <div class="sidebar-panel" id="sidebar-panel">
        <iframe id="sidebar-frame" src="" frameborder="0"></iframe>
      </div>
    </div>
  </div>

  <script src="public/assets/js/main.js"></script>
  <script src="public/assets/js/sidebar.js"></script>
</body>
</html>
