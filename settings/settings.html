<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Heavenly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --text: #e8e8e8;
      --subtext: #666666;
      --border: #2a2a2a;
      --card-bg: #111111;
      --card-hover: #181818;
      --input-bg: #141414;
      --accent: #ffffff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      flex: 0 0 auto;
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--subtext);
    }

    .header-icon svg { width: 18px; height: 18px; }

    .header-text h1 {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--subtext);
      margin-top: 2px;
    }

    .layout {
      flex: 1 1 auto;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      flex: 0 0 180px;
      border-right: 1px solid var(--border);
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .sidebar::-webkit-scrollbar { display: none; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--subtext);
      transition: background 0.12s, color 0.12s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: #151515; color: var(--text); }
    .nav-item.active { background: #1a1a1a; color: var(--text); }
    .nav-item svg { width: 14px; height: 14px; flex: 0 0 14px; }

    .panel {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 24px 28px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .section { display: none; }
    .section.active { display: block; }

    .section-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 20px;
    }

    .group {
      margin-bottom: 28px;
    }

    .group-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 10px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      gap: 16px;
    }

    .setting-row + .setting-row { margin-top: 6px; }

    .setting-label { font-size: 13px; color: var(--text); }
    .setting-sub { font-size: 11px; color: var(--subtext); margin-top: 2px; }

    .toggle {
      width: 38px;
      height: 22px;
      background: #2a2a2a;
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex: 0 0 38px;
      border: none;
    }

    .toggle.on { background: #4a4a4a; }

    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #666;
      top: 3px;
      left: 3px;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle.on::after {
      transform: translateX(16px);
      background: var(--accent);
    }

    .select-input {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      min-width: 130px;
    }

    .select-input:focus { border-color: rgba(255,255,255,0.2); }
    .select-input option { background: #1a1a1a; }

    .text-input {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.2s;
      min-width: 200px;
    }

    .text-input:focus { border-color: rgba(255,255,255,0.2); }
    .text-input::placeholder { color: var(--subtext); }

    .btn-danger {
      background: transparent;
      border: 1px solid #3a1a1a;
      border-radius: 8px;
      color: #c04040;
      font-size: 12px;
      font-family: inherit;
      padding: 7px 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-danger:hover { background: #1a0a0a; border-color: #5a2a2a; }

    .about-block {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .about-title { font-size: 22px; font-weight: 200; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; }
    .about-ver   { font-size: 12px; color: var(--subtext); }
    .about-links { display: flex; gap: 12px; margin-top: 8px; }

    .about-link {
      font-size: 12px;
      color: var(--subtext);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }

    .about-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Settings</h1>
      <p>Heavenly://settings</p>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="panel" id="panel"></div>
  </div>

  <script>
    function load(key, def) {
      try { return localStorage.getItem('heavenly_settings_' + key) ?? def; } catch(e) { return def; }
    }
    function save(key, val) {
      try { localStorage.setItem('heavenly_settings_' + key, val); } catch(e) {}
    }
    function navigate(url) {
      try { window.parent.postMessage({ type: 'navigate', url }, '*'); } catch(e) {}
    }

    const SECTIONS = [
      {
        id: 'general',
        label: 'General',
        icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`,
        render() {
          return `
            <div class="section-title">General</div>
            <div class="group">
              <div class="group-label">On Startup</div>
              <div class="setting-row">
                <div><div class="setting-label">Open page</div></div>
                <select class="select-input" id="startup-page">
                  <option value="newtab">New Tab</option>
                  <option value="Heavenly://games">Games</option>
                  <option value="Heavenly://ai">AI</option>
                </select>
              </div>
            </div>
            <div class="group">
              <div class="group-label">Search</div>
              <div class="setting-row">
                <div><div class="setting-label">Default search engine</div></div>
                <select class="select-input" id="search-engine">
                  <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
                  <option value="https://www.google.com/search?q=">Google</option>
                  <option value="https://www.bing.com/search?q=">Bing</option>
                  <option value="https://search.brave.com/search?q=">Brave</option>
                </select>
              </div>
            </div>
            <div class="group">
              <div class="group-label">Downloads</div>
              <div class="setting-row">
                <div>
                  <div class="setting-label">Ask where to save</div>
                  <div class="setting-sub">Prompt for download location each time</div>
                </div>
                <button class="toggle" id="toggle-ask-download"></button>
              </div>
            </div>
          `;
        },
        init() {
          const startupSel = document.getElementById('startup-page');
          startupSel.value = load('startup', 'newtab');
          startupSel.addEventListener('change', () => save('startup', startupSel.value));

          const engineSel = document.getElementById('search-engine');
          engineSel.value = load('engine', 'https://duckduckgo.com/?q=');
          engineSel.addEventListener('change', () => save('engine', engineSel.value));

          setupToggle('toggle-ask-download', 'ask_download', 'off');
        }
      },
      {
        id: 'appearance',
        label: 'Appearance',
        icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>`,
        render() {
          return `
            <div class="section-title">Appearance</div>
            <div class="group">
              <div class="group-label">Theme</div>
              <div class="setting-row">
                <div><div class="setting-label">Color theme</div></div>
                <select class="select-input" id="theme-select">
                  <option value="dark">Dark</option>
                  <option value="darker">Darker</option>
                  <option value="midnight">Midnight</option>
                </select>
              </div>
              <div class="setting-row">
                <div>
                  <div class="setting-label">Show tab favicons</div>
                  <div class="setting-sub">Display website icons in tabs</div>
                </div>
                <button class="toggle" id="toggle-favicons"></button>
              </div>
            </div>
            <div class="group">
              <div class="group-label">Font</div>
              <div class="setting-row">
                <div><div class="setting-label">UI font size</div></div>
                <select class="select-input" id="font-size">
                  <option value="small">Small</option>
                  <option value="medium">Medium</option>
                  <option value="large">Large</option>
                </select>
              </div>
            </div>
          `;
        },
        init() {
          const themeSel = document.getElementById('theme-select');
          themeSel.value = load('theme', 'dark');
          themeSel.addEventListener('change', () => save('theme', themeSel.value));

          setupToggle('toggle-favicons', 'favicons', 'on');

          const fontSel = document.getElementById('font-size');
          fontSel.value = load('font_size', 'medium');
          fontSel.addEventListener('change', () => save('font_size', fontSel.value));
        }
      },
      {
        id: 'privacy',
        label: 'Privacy',
        icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
        render() {
          return `
            <div class="section-title">Privacy & Security</div>
            <div class="group">
              <div class="group-label">Tracking</div>
              <div class="setting-row">
                <div>
                  <div class="setting-label">Block trackers</div>
                  <div class="setting-sub">Prevent cross-site tracking</div>
                </div>
                <button class="toggle" id="toggle-tracker"></button>
              </div>
              <div class="setting-row">
                <div>
                  <div class="setting-label">Do Not Track</div>
                  <div class="setting-sub">Send DNT header to websites</div>
                </div>
                <button class="toggle" id="toggle-dnt"></button>
              </div>
            </div>
            <div class="group">
              <div class="group-label">Browsing Data</div>
              <div class="setting-row">
                <div>
                  <div class="setting-label">Clear browsing data</div>
                  <div class="setting-sub">Remove cookies, cache, and history</div>
                </div>
                <button class="btn-danger" id="btn-clear">Clear Data</button>
              </div>
            </div>
          `;
        },
        init() {
          setupToggle('toggle-tracker', 'block_trackers', 'on');
          setupToggle('toggle-dnt', 'dnt', 'off');
          document.getElementById('btn-clear').addEventListener('click', () => {
            if (confirm('Clear all Heavenly browsing data? This cannot be undone.')) {
              try {
                const keys = Object.keys(localStorage).filter(k => k.startsWith('heavenly_'));
                keys.forEach(k => localStorage.removeItem(k));
              } catch(e) {}
              alert('Browsing data cleared.');
            }
          });
        }
      },
      {
        id: 'about',
        label: 'About',
        icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`,
        render() {
          return `
            <div class="section-title">About</div>
            <div class="about-block">
              <div class="about-title">Heavenly</div>
              <div class="about-ver">Version 1.0.0 · heavenly-official.github.io</div>
              <div class="about-links">
                <button class="about-link" id="link-github">GitHub</button>
                <button class="about-link" id="link-newtab">New Tab</button>
                <button class="about-link" id="link-games">Games</button>
                <button class="about-link" id="link-ai">AI</button>
              </div>
            </div>
          `;
        },
        init() {
          document.getElementById('link-github').addEventListener('click', () => navigate('https://github.com/Heavenly-Official/heavenly-official.github.io'));
          document.getElementById('link-newtab').addEventListener('click', () => navigate('newtab'));
          document.getElementById('link-games').addEventListener('click', () => navigate('Heavenly://games'));
          document.getElementById('link-ai').addEventListener('click', () => navigate('Heavenly://ai'));
        }
      }
    ];

    function setupToggle(id, key, def) {
      const btn = document.getElementById(id);
      if (!btn) return;
      let state = load(key, def) === 'on';
      if (state) btn.classList.add('on');
      btn.setAttribute('aria-pressed', String(state));
      btn.addEventListener('click', () => {
        state = !state;
        btn.classList.toggle('on', state);
        btn.setAttribute('aria-pressed', String(state));
        save(key, state ? 'on' : 'off');
      });
    }

    // Build sidebar
    const sidebar = document.getElementById('sidebar');
    SECTIONS.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'nav-item' + (i === 0 ? ' active' : '');
      btn.dataset.id = s.id;
      btn.innerHTML = s.icon + s.label;
      btn.addEventListener('click', () => showSection(s.id));
      sidebar.appendChild(btn);
    });

    // Build panels
    const panel = document.getElementById('panel');
    SECTIONS.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'section' + (i === 0 ? ' active' : '');
      div.id = 'section-' + s.id;
      div.innerHTML = s.render();
      panel.appendChild(div);
    });

    // Init all sections
    SECTIONS.forEach(s => s.init());

    function showSection(id) {
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const sec = document.getElementById('section-' + id);
      if (sec) sec.classList.add('active');
      const navBtn = sidebar.querySelector(`[data-id="${id}"]`);
      if (navBtn) navBtn.classList.add('active');
    }
  </script>
</body>
</html>
